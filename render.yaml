services:
  - type: web
    name: sudokupad-party
    runtime: node
    buildCommand: echo "No build step needed"
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_TURN_TTL
        value: "3600"
      - key: TWILIO_TURN_REGION
        sync: false
  - type: cron
    name: sudokupad-party-keep-warm
    runtime: node
    buildCommand: echo "No build step needed"
    startCommand: npm run keep-warm
    schedule: "*/10 * * * *"
    autoDeployTrigger: commit
    envVars:
      - key: WARM_TARGET_URL
        value: https://sudokupad-party.onrender.com/api/health
